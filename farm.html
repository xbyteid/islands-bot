<!DOCTYPE html>
<html>
<head><title>Farm Bot</title></head>
<body style="background:#000;color:#0f0;font:14px monospace;padding:20px">
<h2>Islands Farm Bot</h2>
<p>1. Buka <a href="https://islands.games" target="_blank">islands.games</a> di tab lain</p>
<p>2. Login, masuk game</p>
<p>3. Klik tombol di bawah:</p>
<button onclick="startBot()" style="padding:15px 30px;font-size:18px;background:#0a0;color:#fff;border:none;border-radius:8px;margin:10px 0">START BOT</button>
<button onclick="stopBot()" style="padding:15px 30px;font-size:18px;background:#a00;color:#fff;border:none;border-radius:8px;margin:10px 0">STOP BOT</button>
<div id="status" style="margin-top:20px;padding:10px;background:#111;border:1px solid #0f0">
  Status: Waiting...
</div>
<pre id="log" style="margin-top:10px;height:300px;overflow-y:auto;background:#111;padding:10px;border:1px solid #333"></pre>
<script>
var bot = null;
function log(msg) {
  var el = document.getElementById('log');
  el.textContent = new Date().toLocaleTimeString() + ' ' + msg + '\n' + el.textContent;
}
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
function startBot() {
  if (bot) { log('Already running!'); return; }
  // Find the islands.games tab
  var gameTab = window.open('https://islands.games', '_blank');
  log('Game tab opened. Login and enter the game, then come back here.');
  setStatus('Open the game tab, login, then click START again');
}
function stopBot() {
  if (bot) { bot.running = false; clearInterval(bot.atkInterval); clearInterval(bot.stateInterval); bot = null; }
  setStatus('Stopped');
  log('Bot stopped');
}
</script>
</body>
</html>
